<h2>Admin Login</h2>

<div *ngIf="!isLoggedIn">
  <input [(ngModel)]="loginData.email" placeholder="Email" />
  <input [(ngModel)]="loginData.password" type="password" placeholder="Password" />
  <button (click)="login()">Login</button>
</div>

<div *ngIf="isLoggedIn">
  <p>You are logged in.</p>
  <button (click)="logout()">Logout</button>
</div>

<hr />

<h2>Trips</h2>

<app-add-trip (add)="addTrip($event)"></app-add-trip>

<h3>Trip List</h3>

<p>Total trips: {{ trips.length }}</p>

<div *ngIf="trips.length === 0">
  No trips found.
</div>

<app-trip-card
  *ngFor="let trip of trips"
  [trip]="trip"
  (edit)="editTrip($event)"
  (remove)="deleteTrip($event)">
</app-trip-card>
